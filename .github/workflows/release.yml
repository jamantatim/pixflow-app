name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      
      - name: Build Linux FREE
        run: |
          sed -i 's/IS_PREMIUM_VERSION = true/IS_PREMIUM_VERSION = false/' lib/main.dart
          flutter build linux --release
          cd build/linux/x64/release/bundle
          zip -r ../../../../../PixFlow_Free_Linux.zip .
          
      - name: Build Linux PREMIUM
        run: |
          sed -i 's/IS_PREMIUM_VERSION = false/IS_PREMIUM_VERSION = true/' lib/main.dart
          flutter build linux --release
          cd build/linux/x64/release/bundle
          zip -r ../../../../../PixFlow_Premium_Linux.zip .
          
      - name: Build Android FREE
        run: |
          sed -i 's/IS_PREMIUM_VERSION = true/IS_PREMIUM_VERSION = false/' lib/main.dart
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk PixFlow_Free_Android.apk
          
      - name: Build Android PREMIUM
        run: |
          sed -i 's/IS_PREMIUM_VERSION = false/IS_PREMIUM_VERSION = true/' lib/main.dart
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk PixFlow_Premium_Android.apk
          
      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PixFlow_Free_Linux.zip
            PixFlow_Premium_Linux.zip
            PixFlow_Free_Android.apk
            PixFlow_Premium_Android.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
