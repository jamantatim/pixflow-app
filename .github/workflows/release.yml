name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar ambiente MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      
      - name: Build Windows FREE
        run: |
          (Get-Content lib/main.dart) -replace 'IS_PREMIUM_VERSION = true', 'IS_PREMIUM_VERSION = false' | Set-Content lib/main.dart
          flutter build windows --release
          
      - uses: actions/upload-artifact@v4
        with:
          name: PixFlow_Free_Windows
          path: build/windows/x64/runner/Release/

  build-android-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      
      - name: Build Linux FREE
        run: |
          sed -i 's/IS_PREMIUM_VERSION = true/IS_PREMIUM_VERSION = false/' lib/main.dart
          flutter build linux --release
          
      - uses: actions/upload-artifact@v4
        with:
          name: PixFlow_Free_Linux
          path: build/linux/x64/release/bundle/
          
      - name: Build Android FREE
        run: |
          sed -i 's/IS_PREMIUM_VERSION = true/IS_PREMIUM_VERSION = false/' lib/main.dart
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk PixFlow_Free_Android.apk
          
      - uses: actions/upload-artifact@v4
        with:
          name: PixFlow_Free_Android
          path: PixFlow_Free_Android.apk

  release:
    needs: [build-windows, build-android-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Baixar todos os artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Listar arquivos baixados
        run: ls -R artifacts
        
      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PixFlow_Free_Windows/*
            artifacts/PixFlow_Free_Linux/*
            artifacts/PixFlow_Free_Android/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
