name: Build All Platforms

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4
        
      - name: Instalar o Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          
      - name: Baixar dependências
        run: flutter pub get
        
      - name: Gerar ícones
        run: flutter pub run flutter_launcher_icons
        
      - name: Configurar versão FREE
        run: |
          (Get-Content lib/main.dart) -replace 'IS_PREMIUM_VERSION = true', 'IS_PREMIUM_VERSION = false' | Set-Content lib/main.dart
          
      - name: Compilar Windows FREE
        run: flutter build windows --release
        
      - name: Empacotar Windows FREE
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath PixFlow_Free_Windows.zip
          
      - name: Salvar Windows FREE
        uses: actions/upload-artifact@v4
        with:
          name: PixFlow_Free_Windows
          path: PixFlow_Free_Windows.zip
          
      - name: Configurar versão PREMIUM
        run: |
          (Get-Content lib/main.dart) -replace 'IS_PREMIUM_VERSION = false', 'IS_PREMIUM_VERSION = true' | Set-Content lib/main.dart
          
      - name: Compilar Windows PREMIUM
        run: flutter build windows --release
        
      - name: Empacotar Windows PREMIUM
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath PixFlow_Premium_Windows.zip
          
      - name: Salvar Windows PREMIUM
        uses: actions/upload-artifact@v4
        with:
          name: PixFlow_Premium_Windows
          path: PixFlow_Premium_Windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4
        
      - name: Instalar Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          
      - name: Baixar dependências
        run: flutter pub get
        
      - name: Gerar ícones
        run: flutter pub run flutter_launcher_icons
        
      - name: Configurar versão FREE
        run: sed -i 's/IS_PREMIUM_VERSION = true/IS_PREMIUM_VERSION = false/' lib/main.dart
        
      - name: Compilar Android FREE
        run: flutter build apk --release
        
      - name: Renomear APK FREE
        run: mv build/app/outputs/flutter-apk/app-release.apk PixFlow_Free_Android.apk
        
      - name: Salvar Android FREE
        uses: actions/upload-artifact@v4
        with:
          name: PixFlow_Free_Android
          path: PixFlow_Free_Android.apk
          
      - name: Configurar versão PREMIUM
        run: sed -i 's/IS_PREMIUM_VERSION = false/IS_PREMIUM_VERSION = true/' lib/main.dart
        
      - name: Compilar Android PREMIUM
        run: flutter build apk --release
        
      - name: Renomear APK PREMIUM
        run: mv build/app/outputs/flutter-apk/app-release.apk PixFlow_Premium_Android.apk
        
      - name: Salvar Android PREMIUM
        uses: actions/upload-artifact@v4
        with:
          name: PixFlow_Premium_Android
          path: PixFlow_Premium_Android.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4
        
      - name: Instalar dependências do Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          
      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          
      - name: Baixar dependências
        run: flutter pub get
        
      - name: Gerar ícones
        run: flutter pub run flutter_launcher_icons
        
      - name: Configurar versão FREE
        run: sed -i 's/IS_PREMIUM_VERSION = true/IS_PREMIUM_VERSION = false/' lib/main.dart
        
      - name: Compilar Linux FREE
        run: flutter build linux --release
        
      - name: Empacotar Linux FREE
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../PixFlow_Free_Linux.zip .
          
      - name: Salvar Linux FREE
        uses: actions/upload-artifact@v4
        with:
          name: PixFlow_Free_Linux
          path: PixFlow_Free_Linux.zip
          
      - name: Configurar versão PREMIUM
        run: sed -i 's/IS_PREMIUM_VERSION = false/IS_PREMIUM_VERSION = true/' lib/main.dart
        
      - name: Compilar Linux PREMIUM
        run: flutter build linux --release
        
      - name: Empacotar Linux PREMIUM
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../PixFlow_Premium_Linux.zip .
          
      - name: Salvar Linux PREMIUM
        uses: actions/upload-artifact@v4
        with:
          name: PixFlow_Premium_Linux
          path: PixFlow_Premium_Linux.zip
